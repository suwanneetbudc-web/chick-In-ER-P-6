<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าเวลาทำงาน | ศูนย์แพทย์ พุทธชินราช</title>
    <link rel="icon" type="image/png" href="logo-sm.png" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] }, colors: { medical: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' } } } } }
    </script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans p-4 sm:p-8 min-h-screen">
    <div class="max-w-4xl mx-auto w-full">
        <div
            class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-4">
                <div
                    class="bg-medical-50 text-medical-600 w-12 h-12 rounded-2xl flex items-center justify-center text-xl border border-medical-100 shadow-inner">
                    <i class="fas fa-business-time"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800">ตั้งค่าหมวดเวลาทำงาน</h1>
                    <p class="text-xs text-slate-500 mt-0.5">ระบุตำแหน่งที่ใช้ หรือใส่ "?" เพื่อให้ใช้ร่วมกันทุกคน
                        (เว้นว่างเวลาได้ถ้าไม่กำหนด)</p>
                </div>
            </div>
            <a href="admin.html"
                class="w-full sm:w-auto text-center bg-slate-100 text-slate-700 px-5 py-2.5 rounded-xl font-bold hover:bg-slate-200 transition shadow-sm"><i
                    class="fas fa-arrow-left mr-2"></i> กลับแดชบอร์ด</a>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100">
            <div class="flex justify-between items-center mb-5 pb-3 border-b border-slate-100">
                <h2 class="font-bold text-medical-700 text-lg"><i class="fas fa-list-ul mr-2"></i> กฎการลงเวลา</h2>
                <button onclick="addTimeRow()"
                    class="bg-medical-100 text-medical-700 hover:bg-medical-200 px-4 py-2 rounded-xl text-sm font-bold transition shadow-sm"><i
                        class="fas fa-plus"></i> เพิ่มหมวด</button>
            </div>

            <div id="timeList" class="space-y-3 mb-6"></div>

            <button onclick="saveAllSettings()" id="saveBtn"
                class="w-full bg-medical-700 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-medical-800 transition"><i
                    class="fas fa-save mr-2"></i> บันทึกข้อมูล</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let timeSettings = [];
        document.addEventListener("DOMContentLoaded", fetchTimeSettings);

        async function fetchTimeSettings() {
            try {
                const res = await fetch(CONFIG.WEB_APP_API, { method: "POST", body: JSON.stringify({ action: "getTimeSettings" }) });
                timeSettings = await res.json();
                if (!Array.isArray(timeSettings) || timeSettings.length === 0) {
                    timeSettings = [{ job: 'เวร', role: '?', inTime: '08:30', outTime: '16:30' }];
                }
                renderTimeList();
            } catch (e) { Swal.fire("ข้อผิดพลาด", "ไม่สามารถดึงข้อมูลได้", "error"); }
        }

        function renderTimeList() {
            const listEl = document.getElementById('timeList');
            listEl.innerHTML = '';

            timeSettings.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = "flex flex-col md:flex-row gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-200 items-end md:items-center";
                row.innerHTML = `
                    <div class="w-full md:flex-[2]">
                        <label class="block text-[11px] font-bold text-slate-500 mb-1 pl-1">หมวด (เช่น เวร, เขียนรายงาน)</label>
                        <input type="text" value="${item.job}" oninput="updateData(${index}, 'job', this.value)" class="w-full bg-white border border-slate-300 p-2.5 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-medical-500">
                    </div>
                    <div class="w-full md:flex-[2]">
                        <label class="block text-[11px] font-bold text-slate-500 mb-1 pl-1">ตำแหน่ง (หรือใส่ ? ให้ทุกคน)</label>
                        <input type="text" value="${item.role}" oninput="updateData(${index}, 'role', this.value)" class="w-full bg-white border border-slate-300 p-2.5 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-medical-500">
                    </div>
                    <div class="w-full md:flex-1">
                        <label class="block text-[11px] font-bold text-slate-500 mb-1 pl-1">เวลาเข้า</label>
                        <input type="time" value="${item.inTime}" oninput="updateData(${index}, 'inTime', this.value)" class="w-full bg-white border border-slate-300 p-2.5 rounded-xl text-sm font-bold text-emerald-600 outline-none focus:border-medical-500">
                    </div>
                    <div class="w-full md:flex-1">
                        <label class="block text-[11px] font-bold text-slate-500 mb-1 pl-1">เวลาออก</label>
                        <input type="time" value="${item.outTime}" oninput="updateData(${index}, 'outTime', this.value)" class="w-full bg-white border border-slate-300 p-2.5 rounded-xl text-sm font-bold text-rose-500 outline-none focus:border-medical-500">
                    </div>
                    <button onclick="removeTimeRow(${index})" class="w-full md:w-auto mt-2 md:mt-0 bg-rose-50 text-rose-500 hover:bg-rose-100 px-4 py-2.5 rounded-xl text-sm font-bold transition h-full"><i class="fas fa-trash-alt"></i></button>
                `;
                listEl.appendChild(row);
            });
        }

        function updateData(index, key, value) { timeSettings[index][key] = value; }
        function addTimeRow() { timeSettings.push({ job: '', role: '?', inTime: '', outTime: '' }); renderTimeList(); }
        function removeTimeRow(index) { timeSettings.splice(index, 1); renderTimeList(); }

        async function saveAllSettings() {
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = 'กำลังบันทึก...'; btn.disabled = true;
            try {
                await fetch(CONFIG.WEB_APP_API, { method: "POST", body: JSON.stringify({ action: "saveTimeSettings", times: timeSettings }) });
                Swal.fire({ title: "สำเร็จ!", icon: "success", timer: 1500, showConfirmButton: false });
            } catch (error) {
                Swal.fire("ล้มเหลว", "บันทึกไม่ได้", "error");
            } finally {
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> บันทึกข้อมูล'; btn.disabled = false;
            }
        }
    </script>
</body>

</html>
